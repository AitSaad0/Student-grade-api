name: ci

on: 
  push:   
    branch: [main]
  pull_request: 
    branch: [main]
  
jobs: 
  test:
    runs-on: ubuntu-latest

    steps: 
      - uses: action/checkout@v4
      - uses: action/setup-python@v5
        with: 
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

