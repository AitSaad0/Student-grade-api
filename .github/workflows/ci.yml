name: ci

on: 
  push:   
    branches: [main]
  pull_request: 
    branches: [main]
  
jobs: 
  lint:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . 
   
  test:
    needs: lint
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  docker: 
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
     
      - name: Build Docker image 
        run: docker build -t student-grade-api:latest .


